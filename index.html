<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Edwin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0d0b;
      --text: #e8e2d6;
      --accent: #c4a574;
      --muted: #5a554c;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
    }

    body {
      font-family: "Instrument Serif", Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px 180px;
    }

    .glow {
      position: fixed;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(196, 165, 116, 0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    main {
      text-align: center;
      padding: 2rem;
      animation: emerge 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 7.5rem);
      font-weight: 400;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .line {
      display: block;
    }

    .line--first {
      font-style: italic;
      color: var(--muted);
      font-size: 0.55em;
      letter-spacing: 0.12em;
      text-transform: lowercase;
      margin-bottom: 0.15em;
    }

    .line--name {
      position: relative;
    }

    .line--name::after {
      content: "";
      display: block;
      width: 1.5em;
      height: 1px;
      background: var(--accent);
      margin: 0.6em auto 0;
      opacity: 0;
      animation: rule-in 0.8s 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .accent {
      color: var(--accent);
    }

    @keyframes emerge {
      from {
        opacity: 0;
        transform: translateY(12px);
        filter: blur(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0);
      }
    }

    @keyframes rule-in {
      from {
        opacity: 0;
        width: 0;
      }
      to {
        opacity: 1;
        width: 1.5em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      main,
      .line--name::after {
        animation: none;
        opacity: 1;
      }

      .line--name::after {
        width: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>
  <main>
    <h1>
      <span class="line line--first">awesome</span>
      <span class="line line--name"><span class="accent">E</span>dwin</span>
    </h1>
  </main>
</body>
</html>
